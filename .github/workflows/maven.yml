name: Java CI/CD Automation with Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد جافا
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. تشغيل الفحص وتوليد تقرير Allure عبر المافن مباشرة
      - name: Run Tests and Generate Report
        run: |
          mvn test
          mvn allure:report
        continue-on-error: true

      # 4. رفع المجلد المتولد رسمياً لجيتهاب بدون أدوات خارجية
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: 'target/site/allure-maven-plugin'

      # 5. النشر المباشر على الويب
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()