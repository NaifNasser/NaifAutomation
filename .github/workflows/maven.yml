name: Java CI/CD Automation with Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# إعطاء صلاحيات كاملة لأداة جيتهاب الرسمية لرفع التقارير وصفحات الويب
permissions:
  contents: write
  pages: write
  id-token: write

# إعداد بيئة واحدة للـ Deployment لتجنب تضارب السيرفرات
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد جافا
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. تشغيل الفحص وتوليد ملفات النتائج
      - name: Run Automation Tests
        run: mvn test
        continue-on-error: true

      # 4. بناء تقرير Allure الرسمي ودمجه داخل السيرفر
      - name: Load Allure History and Generate Report
        uses: simple-elf/allure-report-action@v1.11
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      # 5. تهيئة ورفع ملفات التقرير كـ Artifact رسمي لـ GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: 'allure-history'

      # 6. النشر المباشر والسريع على الويب باستخدام أداة جيتهاب الرسمية
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()