name: Java CI/CD Automation with Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع إلى السيرفر
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (JDK 21 للتوافق مع المافن في السيرفر)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. تشغيل فحص السيلينيوم (بدون واجهة رسومية سحابية Headless)
      - name: Run Automation Tests
        run: mvn test