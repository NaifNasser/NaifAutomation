name: Java CI/CD Automation with Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد جافا
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. تشغيل الفحص وتوليد التقرير
      - name: Run Tests and Generate Report
        run: |
          mvn test
          mvn allure:report
        continue-on-error: true

      # 4. الرفع باستخدام الأداة الحديثة v4 المتوافقة مع Node 24 مجبرةً
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-website
          path: target/site/allure-maven-plugin/