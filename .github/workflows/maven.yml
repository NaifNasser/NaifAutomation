name: Java CI/CD Automation with Selenium

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد جافا
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. تشغيل التيست وتوليد ملفات الـ JSON لـ Allure
      - name: Run Automation Tests
        run: mvn test
        continue-on-error: true

      # 4. أمر مافن السحري لتوليد مجلد التقرير الثابت يدوياً داخل السيرفر
      - name: Generate Allure Report Directory
        run: |
          mvn allure:report
          mkdir -p allure-history
          cp -r target/site/allure-maven-plugin/* allure-history/
        continue-on-error: true

      # 5. رفع التقرير فوراً ونشره على GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history